{% extends "base.html" %}
{% block title %}Sign In{% endblock %}

{% block auth_content %}
<div class="auth-page">
  <div class="auth-container">
    <!-- RIGHT: Brand Panel -->
    <div class="auth-right" style="order:1">
      <div class="auth-brand-icon"><i class="fa-solid fa-circle-dot"></i></div>
      <div class="auth-welcome">Welcome Back!</div>
      <div class="auth-tagline">Track your fitness journey and achieve your goals</div>
      <div class="auth-img-box">
        <img src="https://images.unsplash.com/photo-1571019614242-c5c5dee9f50b?w=600&q=80" alt="Fitness"/>
      </div>
    </div>
    <!-- LEFT: Form -->
    <div class="auth-left" style="order:2">
      <h1 class="auth-heading">Sign In</h1>
      <p class="auth-sub">Enter your credentials to access your account</p>

      <div id="error-msg" style="display:none;color:#BE123C;font-size:13px;margin-bottom:12px;padding:10px 14px;background:#FFF1F2;border-radius:8px;border:1px solid #FECDD3"></div>

      <div class="form-group">
        <label class="form-label">Email Address</label>
        <div class="input-wrap">
          <i class="fa-regular fa-envelope input-icon"></i>
          <input type="email" id="email" class="form-input" placeholder="Enter your email" autocomplete="email"/>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="input-wrap">
          <i class="fa-solid fa-lock input-icon"></i>
          <input type="password" id="password" class="form-input" placeholder="Enter your password"/>
          <button class="toggle-pw" onclick="togglePw('password',this)" type="button">
            <i class="fa-regular fa-eye"></i>
          </button>
        </div>
      </div>

      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
        <label class="form-check">
          <input type="checkbox"> Remember me
        </label>
        <a href="#" class="link-purple">Forgot Password?</a>
      </div>

      <button class="btn btn-primary btn-full" id="login-btn" onclick="doLogin()">
        Sign In
      </button>

      <div class="divider">Or continue with</div>

      <div class="social-btns">
        <button class="social-btn">
          <img src="https://www.google.com/favicon.ico" width="16"> Google
        </button>
        <button class="social-btn">
          <i class="fa-brands fa-facebook" style="color:#1877F2"></i> Facebook
        </button>
      </div>

      <div class="auth-footer">
        Don't have an account? <a href="{{ url_for('signup') }}">Sign Up</a>
      </div>
    </div>
  </div>
</div>

<script>
async function doLogin() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('login-btn');
  const err = document.getElementById('error-msg');
  if (!email || !password) { showErr('Please fill in all fields.'); return; }
  btn.innerHTML = '<span class="spinner"></span> Signing in...';
  btn.disabled = true;
  const res = await fetch('/login', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({email, password})
  });
  const data = await res.json();
  if (data.success) { window.location.href = data.redirect; }
  else { showErr(data.message || 'Login failed.'); btn.innerHTML = 'Sign In'; btn.disabled = false; }
}
function showErr(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg; el.style.display = 'block';
}
document.addEventListener('keydown', e => { if (e.key==='Enter') doLogin(); });
</script>
{% endblock %}
