<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FitPlan AI – {% block title %}{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}"/>
  {% block extra_css %}{% endblock %}
</head>
<body>
  {% if session.get('user_id') %}
  <div class="app-layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="logo-icon">
          <i class="fa-solid fa-circle-dot"></i>
        </div>
      </div>
      <nav class="sidebar-nav">
        <a href="{{ url_for('dashboard') }}" class="nav-item {% if request.endpoint == 'dashboard' %}active{% endif %}" title="Dashboard">
          <i class="fa-solid fa-house"></i>
        </a>
        <a href="{{ url_for('workout_plan') }}" class="nav-item {% if request.endpoint == 'workout_plan' %}active{% endif %}" title="Workout Plan">
          <i class="fa-solid fa-calendar-check"></i>
        </a>
        <a href="{{ url_for('analytics') }}" class="nav-item {% if request.endpoint == 'analytics' %}active{% endif %}" title="Analytics">
  <i class="fa-solid fa-chart-simple"></i>
</a>
        <a href="{{ url_for('schedule') }}" class="nav-item {% if request.endpoint == 'schedule' %}active{% endif %}" title="Schedule">
  <i class="fa-solid fa-calendar"></i>
</a>
        <a href="#" class="nav-item" title="Help">
          <i class="fa-regular fa-circle-question"></i>
        </a>
        <a href="#" class="nav-item" title="Videos">
          <i class="fa-solid fa-video"></i>
        </a>
      </nav>
      <a href="{{ url_for('logout') }}" class="nav-item sidebar-logout" title="Logout">
        <i class="fa-solid fa-right-from-bracket"></i>
      </a>
    </aside>
    <!-- Main content -->
    <main class="main-content">
      {% block content %}{% endblock %}
    </main>
  </div>
  {% else %}
  {% block auth_content %}{% endblock %}
  {% endif %}

  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
