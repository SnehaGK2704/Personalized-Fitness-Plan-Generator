{% extends "base.html" %}
{% block title %}Profile Setup{% endblock %}

{% block auth_content %}
<div class="profile-setup-page">
  <div class="profile-card">
    <div class="setup-icon"><i class="fa-solid fa-user-pen"></i></div>
    <h2 style="font-family:var(--font-head);font-size:22px;font-weight:800;margin-bottom:6px">Complete Your Profile</h2>
    <p style="font-size:13px;color:var(--text-light);margin-bottom:28px">Help us personalize your fitness experience</p>

    <div id="error-msg" style="display:none;color:#BE123C;font-size:13px;margin-bottom:12px;padding:10px 14px;background:#FFF1F2;border-radius:8px;border:1px solid #FECDD3"></div>

    <div class="form-group">
      <label class="form-label">Full Name</label>
      <div class="input-wrap">
        <i class="fa-regular fa-user input-icon"></i>
        <input type="text" id="name" class="form-input" placeholder="Your full name"/>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Age</label>
        <div class="input-wrap">
          <i class="fa-solid fa-cake-candles input-icon"></i>
          <input type="number" id="age" class="form-input" placeholder="Years" min="10" max="100"/>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Gender</label>
        <select class="form-select" id="gender">
          <option value="">Select gender</option>
          <option value="Male">Male</option>
          <option value="Female">Female</option>
          <option value="Other">Other</option>
        </select>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Height (cm)</label>
        <div class="input-wrap">
          <i class="fa-solid fa-ruler-vertical input-icon"></i>
          <input type="number" id="height" class="form-input" placeholder="e.g. 175" min="100" max="250"/>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Weight (kg)</label>
        <div class="input-wrap">
          <i class="fa-solid fa-weight-scale input-icon"></i>
          <input type="number" id="weight" class="form-input" placeholder="e.g. 70" min="30" max="300" step="0.1"/>
        </div>
      </div>
    </div>

    <button class="btn btn-primary btn-full" id="save-btn" onclick="saveProfile()" style="margin-top:8px">
      <i class="fa-solid fa-check"></i> Save & Continue
    </button>

    <div style="text-align:center;margin-top:14px">
      <a href="{{ url_for('dashboard') }}" style="font-size:13px;color:var(--text-light);text-decoration:none">
        Skip for now
      </a>
    </div>
  </div>
</div>

<script>
async function saveProfile() {
  const name = document.getElementById('name').value.trim();
  const age = document.getElementById('age').value;
  const height = document.getElementById('height').value;
  const weight = document.getElementById('weight').value;
  const btn = document.getElementById('save-btn');
  if (!name || !age || !height || !weight) {
    document.getElementById('error-msg').textContent = 'Please fill in all fields.';
    document.getElementById('error-msg').style.display = 'block';
    return;
  }
  btn.innerHTML = '<span class="spinner"></span> Saving...';
  btn.disabled = true;
  const res = await fetch('/profile-setup', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({name, age: parseInt(age), height: parseFloat(height), weight: parseFloat(weight)})
  });
  const data = await res.json();
  if (data.success) window.location.href = data.redirect;
  else { btn.innerHTML = '<i class="fa-solid fa-check"></i> Save & Continue'; btn.disabled = false; }
}
</script>
{% endblock %}
